name: Release & Publish to PyPI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    # ── Build check: runs on PRs to verify package builds correctly ──────
    check:
        if: github.event_name == 'pull_request'
        name: Build check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Install build tools
              run: python -m pip install --upgrade pip build twine

            - name: Build package
              run: python -m build

            - name: Verify package metadata
              run: python -m twine check dist/*

    # ── Prepare: extract version, update pyproject.toml, tag ─────────────
    # Only runs on push to main with commit message starting with "release:"
    prepare:
        if: >-
            github.event_name == 'push' &&
            startsWith(github.event.head_commit.message, 'release:')
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            version: ${{ steps.meta.outputs.version }}
            tag: ${{ steps.meta.outputs.tag }}
            prerelease: ${{ steps.meta.outputs.prerelease }}

        steps:
            - uses: actions/checkout@v4

            - name: Extract release metadata
              id: meta
              env:
                  COMMIT_MSG: ${{ github.event.head_commit.message }}
              run: |
                  SUBJECT=$(echo "$COMMIT_MSG" | head -1)

                  # Support both "release: v2.0.0" and "release: 2.0.0"
                  VERSION=$(echo "$SUBJECT" | sed -n 's/^release:[[:space:]]*v\{0,1\}\([^[:space:]]\{1,\}\).*/\1/p')

                  if [ -z "$VERSION" ]; then
                    echo "::error::Could not extract version from: $SUBJECT"
                    echo "::error::Expected format: release: v2.0.0 or release: 2.0.0b1"
                    exit 1
                  fi

                  TAG="v${VERSION}"

                  # PEP 440 pre-release identifiers: alpha (aN), beta (bN), rc (rcN), dev (devN)
                  if echo "$VERSION" | grep -qE '(a|b|rc|dev)[0-9]+'; then
                    PRERELEASE=true
                  else
                    PRERELEASE=false
                  fi

                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

                  echo "### 📦 Release" >> "$GITHUB_STEP_SUMMARY"
                  echo "- **Version:** \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "- **Tag:** \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "- **Pre-release:** $PRERELEASE" >> "$GITHUB_STEP_SUMMARY"

            - name: Check tag does not already exist
              run: |
                  if git rev-parse "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
                    echo "::error::Tag ${{ steps.meta.outputs.tag }} already exists"
                    exit 1
                  fi

            - name: Update pyproject.toml version
              run: |
                  sed -i 's/^version = .*/version = "'"${{ steps.meta.outputs.version }}"'"/' pyproject.toml
                  echo "pyproject.toml version set to: $(grep '^version' pyproject.toml)"

            - name: Commit version bump & create tag
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git add pyproject.toml
                  # Only commit if pyproject.toml actually changed
                  if ! git diff --cached --quiet; then
                    git commit -m "chore: bump version to ${{ steps.meta.outputs.version }}"
                  fi

                  git tag "${{ steps.meta.outputs.tag }}"
                  git push origin HEAD:main --tags

    # ── Build release artifacts ──────────────────────────────────────────
    build:
        needs: prepare
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ needs.prepare.outputs.tag }}

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Install build tools
              run: python -m pip install --upgrade pip build twine

            - name: Build package
              run: python -m build

            - name: Verify package
              run: python -m twine check dist/*

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: python-package-distributions
                  path: dist/

    # ── Publish to PyPI via Trusted Publishing (OIDC) ────────────────────
    publish-pypi:
        needs: [prepare, build]
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
            id-token: write

        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: python-package-distributions
                  path: dist/

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1

    # ── Create GitHub Release with signed artifacts ──────────────────────
    github-release:
        needs: [prepare, build, publish-pypi]
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write

        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: python-package-distributions
                  path: dist/

            - name: Sign with Sigstore
              uses: sigstore/gh-action-sigstore-python@v3.3.0
              with:
                  inputs: >-
                      ./dist/*.tar.gz
                      ./dist/*.whl

            - name: Create GitHub Release
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: |
                  PRERELEASE_FLAG=""
                  if [ "${{ needs.prepare.outputs.prerelease }}" = "true" ]; then
                    PRERELEASE_FLAG="--prerelease"
                  fi

                  gh release create "${{ needs.prepare.outputs.tag }}" \
                    dist/* \
                    --repo "${{ github.repository }}" \
                    --generate-notes \
                    $PRERELEASE_FLAG
