name: CI Check

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]

jobs:
    check:
        name: Lint & Type Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.10"

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  enable-cache: true

            - name: Install Dependencies
              run: |
                  uv sync

            - name: Run Ruff Check
              run: uv run ruff check src/chroot_distro

            - name: Run Pyright Type Check
              run: uv run pyright src/chroot_distro

            - name: Run Mypy Type Check
              run: uv run mypy src/chroot_distro

    test:
        name: Run Tests (Python ${{ matrix.python-version }})
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  enable-cache: true

            - name: Install Dependencies
              run: |
                  uv sync

            - name: Run Tests
              run: |
                  uv run pytest tests/ --cov=chroot_distro
